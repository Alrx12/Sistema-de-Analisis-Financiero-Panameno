version: "3.9"

services:
  caddy:
    image: caddy:2
    container_name: saff_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - api
    networks:
      - app_net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://apineda:InsightLex@postgres:5432/safpro
      REDIS_URL: redis://redis:6379/0
      RUN_MIGRATIONS: "false"
    volumes:
      - storage_data:/app/storage
    depends_on:
        postgres:
          condition: service_healthy
        redis:
          condition: service_healthy
        api:
          condition: service_healthy

  postgres:
    image: postgres:16
    container_name: saff_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: safpro
      POSTGRES_USER: apineda
      POSTGRES_PASSWORD: InsightLex
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apineda} -d ${POSTGRES_DB:-safpro}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
  app_storage:
  caddy_data:
  caddy_config:

networks:
  app_net:
    driver: bridge