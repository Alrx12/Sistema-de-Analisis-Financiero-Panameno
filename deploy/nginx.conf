server {
    listen 80;
    server_name _;
    server_tokens off;

    root /home/lex/safpro/frontend/dist;
    index index.html;

    # ══════════════════════════════════════════════════════════════════════════
    # SECURITY HEADERS
    # ══════════════════════════════════════════════════════════════════════════
    # NOTA nginx: add_header NO se hereda en locations con sus propios add_header.
    # Por eso los headers se repiten en cada location que tiene add_header propio.
    # ── Headers universales ───────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # HSTS — fuerza HTTPS por 1 año (incluye subdominios).
    # Solo añadir cuando el sitio esté 100% en HTTPS (Cloudflare lo gestiona).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Content Security Policy
    # Permite:
    #   script-src  → Umami Analytics (cloud.umami.is) + Cloudflare Insights
    #   connect-src → API propia + Sentry (ingest.sentry.io) + Umami
    #   img-src     → self, data:, blob: (avatares, exports)
    #   style-src   → self + unsafe-inline (shadcn/ui Tailwind)
    #   font-src    → self
    #   object-src  → none (no Flash ni embeds)
    #   frame-ancestors → none (bloquea clickjacking)
    #   base-uri    → self (evita base-tag injection)
    #   form-action → self
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cloud.umami.is https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://safpro.us https://www.safpro.us https://cloud.umami.is https://*.sentry.io https://cloudflareinsights.com; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        client_max_body_size 20M;
        proxy_read_timeout   30s;
        proxy_connect_timeout 5s;

        # Ocultar info del servidor backend
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # ── Frontend SPA ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Assets estáticos (con hash — cache 1 año) ─────────────────────────────
    # Repite security headers porque este location tiene su propio add_header.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cloud.umami.is https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://safpro.us https://www.safpro.us https://cloud.umami.is https://*.sentry.io https://cloudflareinsights.com; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    }

    # ── index.html (sin cache) ────────────────────────────────────────────────
    # Repite security headers porque este location tiene su propio add_header.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cloud.umami.is https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://safpro.us https://www.safpro.us https://cloud.umami.is https://*.sentry.io https://cloudflareinsights.com; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    }
}
