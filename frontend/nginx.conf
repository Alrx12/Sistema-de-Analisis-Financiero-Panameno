# ── SAFPRO nginx — Frontend SPA + API Proxy ───────────────────────────────────
# Sirve los archivos estáticos del frontend React y hace proxy de /api al backend.
# El frontend usa baseURL: "/api/v1" (relativo), así que todo funciona sin
# ningún cambio en el código del frontend.
# ─────────────────────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging — en producción considera enviar a un agregador
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log warn;

    server_tokens off;

    sendfile        on;
    keepalive_timeout 65;

    # Compresión gzip para archivos estáticos y respuestas de API
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # Upstream del backend FastAPI
    upstream api_backend {
        server api:8001;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # ── Proxy para la API ─────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://api_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Subida de archivos Excel — hasta 20 MB
            client_max_body_size 20M;

            # Timeouts generosos para el procesamiento de Celery polling
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # ── Frontend SPA — fallback a index.html ─────────────────────────────
        # React Router maneja el routing en el cliente.
        # Cualquier ruta que no sea un archivo estático devuelve index.html.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache largo para assets con hash en el nombre (JS, CSS, imágenes)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # No cachear index.html — siempre debe ser fresco
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
}
