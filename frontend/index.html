<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <title>SAFPRO — Análisis Financiero</title>

    <!--
      Umami Analytics — privacy-friendly, sin cookies, GDPR compliant.
      Pasos de configuración:
        1. Crear cuenta en https://umami.is o auto-hospedar con Docker
        2. Agregar tu sitio (safpro.us) → copiar el Website ID
        3. Reemplazar data-website-id con tu ID real
        4. Si auto-hospedas, cambiar el src a tu dominio de Umami
      Umami NO usa cookies, NO comparte datos con terceros, NO interfiere con RLS.
    -->
    <script
      defer
      src="https://cloud.umami.is/script.js"
      data-website-id="REEMPLAZAR-CON-TU-UMAMI-WEBSITE-ID"
      data-domains="safpro.us,www.safpro.us"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
