name: Build Android APK / AAB

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Tipo de build'
        required: true
        default: 'release-apk'
        type: choice
        options:
          - release-apk
          - release-aab
          - debug

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Configure git safe directory
        run: git config --global --add safe.directory "*"

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild (genera carpeta android/)
        working-directory: mobile
        env:
          EXPO_PUBLIC_API_URL: https://safpro.us/api/v1
          NODE_ENV: production
        run: npx expo prebuild --platform android --no-install

      # ── RELEASE: decodificar keystore desde GitHub Secret ──────────────────
      - name: Decode keystore (solo en release)
        if: github.event.inputs.build_type == 'release-apk' || github.event.inputs.build_type == 'release-aab'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > mobile/android/app/safpro-release.keystore

      - name: Build release APK (firmado — para instalación directa / sideload)
        if: github.event.inputs.build_type == 'release-apk'
        working-directory: mobile/android
        env:
          JAVA_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"
          EXPO_PUBLIC_API_URL: https://safpro.us/api/v1
          NODE_ENV: production
          KEYSTORE_FILE: safpro-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/safpro-release.keystore \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            --no-daemon --stacktrace

      - name: Upload release APK artifact
        if: github.event.inputs.build_type == 'release-apk'
        uses: actions/upload-artifact@v4
        with:
          name: safpro-release-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          if-no-files-found: error

      - name: Build release AAB (firmado — para publicar en Google Play Store)
        if: github.event.inputs.build_type == 'release-aab'
        working-directory: mobile/android
        env:
          JAVA_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"
          EXPO_PUBLIC_API_URL: https://safpro.us/api/v1
          NODE_ENV: production
          KEYSTORE_FILE: safpro-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/safpro-release.keystore \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            --no-daemon --stacktrace

      - name: Upload release AAB artifact
        if: github.event.inputs.build_type == 'release-aab'
        uses: actions/upload-artifact@v4
        with:
          name: safpro-release-aab
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
          if-no-files-found: error

      # ── DEBUG: build sin firma de release ──────────────────────────────────
      - name: Build debug APK (firmado con debug key)
        if: github.event.inputs.build_type == 'debug'
        working-directory: mobile/android
        env:
          JAVA_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"
          EXPO_PUBLIC_API_URL: https://safpro.us/api/v1
          NODE_ENV: production
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK artifact
        if: github.event.inputs.build_type == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: safpro-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: error
