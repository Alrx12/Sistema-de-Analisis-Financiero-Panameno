name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/safpro-backend
  FRONTEND_IMAGE: ${{ github.repository }}/safpro-frontend

jobs:
  # ── Backend: Lint, Test, Build ────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_safpro
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8 (optional — add if configured)
        working-directory: ./backend
        run: |
          # pip install flake8
          # flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
          echo "Linting skipped — configure flake8 in setup.cfg or .flake8"

      - name: Run pytest
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+psycopg://testuser:testpass@localhost:5432/test_safpro
          REDIS_URL: redis://localhost:6379/0
        run: pytest -v

      - name: Build backend Docker image
        working-directory: ./backend
        run: |
          docker build -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
                       -t ${{ env.BACKEND_IMAGE }}:latest \
                       .

  # ── Frontend: Lint, Build ─────────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --frozen-lockfile

      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Build frontend Docker image
        working-directory: ./frontend
        run: |
          docker build -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
                       -t ${{ env.FRONTEND_IMAGE }}:latest \
                       .

  # ── Docker Compose Integration Test ────────────────────────────────────────
  integration:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env for compose
        run: |
          cat > .env << EOF
          POSTGRES_PASSWORD=testpass123
          EOF

      - name: Start services with docker compose
        run: docker compose -f docker-compose.yml up -d --wait

      - name: Check API health
        run: |
          for i in {1..30}; do
            if curl -f http://localhost/api/v1/health 2>/dev/null; then
              echo "API is healthy"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
          echo "API failed to become healthy"
          docker compose logs
          exit 1

      - name: Check frontend
        run: curl -f http://localhost/ > /dev/null

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose logs api
          docker compose logs worker
          docker compose logs frontend
          docker compose ps

      - name: Stop services
        if: always()
        run: docker compose down -v

  # ── Publish images to GHCR (only on main branch) ───────────────────────────
  publish:
    runs-on: ubuntu-latest
    needs: [backend, frontend, integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
