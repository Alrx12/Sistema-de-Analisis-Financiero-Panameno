# ── SAFPRO — Entorno de desarrollo local ────────────────────────────────────
# Levanta PostgreSQL y Redis en local para desarrollar sin Tailscale.
#
# Uso:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml down
#
# Primera vez: también corre las migraciones:
#   cd backend && .venv/Scripts/python.exe -m alembic upgrade head  (Windows)
# ─────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:15-alpine
    container_name: safpro_dev_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: safpro_dev
      POSTGRES_PASSWORD: safpro_dev
      POSTGRES_DB: safpro
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: safpro_dev_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_dev_data:
