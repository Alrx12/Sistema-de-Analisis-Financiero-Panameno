# ── SAFPRO — Docker Compose (producción) ─────────────────────────────────────
#
# Servicios:
#   postgres  — base de datos persistente
#   redis     — broker de Celery
#   api       — FastAPI server (corre migraciones en arranque)
#   worker    — Celery worker (procesa uploads en background)
#   frontend  — nginx que sirve la SPA React y hace proxy de /api → api
#
# Volúmenes persistentes:
#   postgres_data  — datos de PostgreSQL
#   storage_data   — uploads, KB files, temp files (compartido entre api y worker)
#
# ANTES DE ARRANCAR:
#   1. Copia .env.example a backend/.env y rellena los valores
#   2. docker compose up -d --build
#
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: safpro
      POSTGRES_USER: safpro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Variable POSTGRES_PASSWORD requerida}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safpro -d safpro"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # No exponer puerto al exterior — solo los servicios internos se conectan
    expose:
      - "5432"

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "6379"

  # ── API Server ──────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      # Sobreescribe las variables de .env que necesitan apuntar a los servicios Docker
      DATABASE_URL: postgresql+psycopg://safpro:${POSTGRES_PASSWORD}@postgres:5432/safpro
      REDIS_URL: redis://redis:6379/0
      # Activa el paso de migraciones en el entrypoint
      RUN_MIGRATIONS: "true"
    volumes:
      - storage_data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # No exponer el puerto al exterior — nginx hace el proxy interno
    expose:
      - "8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # Sobreescribe el CMD del Dockerfile: worker en lugar de uvicorn
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://safpro:${POSTGRES_PASSWORD}@postgres:5432/safpro
      REDIS_URL: redis://redis:6379/0
      # El worker NO corre migraciones
      RUN_MIGRATIONS: "false"
    volumes:
      # Mismo volumen que el api — ambos necesitan leer/escribir storage/knowledge_bases
      - storage_data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  # ── Frontend (nginx + React build) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      # Puerto 80: HTTP (funciona sin dominio — accede por IP del servidor)
      - "80:80"
      # Puerto 443: HTTPS — descomenta cuando configures Let's Encrypt
      # - "443:443"
    depends_on:
      api:
        condition: service_healthy


# ── Volúmenes persistentes ────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  storage_data:
    driver: local
